# @claude mention responder for issues and PRs in auto-docs.
#
# Type `@claude <instruction>` in any issue or PR comment and Claude will
# run with read/write access scoped to the product folders.

name: Claude

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          # @v1 accepts OAuth tokens via anthropic_api_key (the input is
          # named for legacy reasons but routes both API keys and OAuth tokens).
          anthropic_api_key: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_instructions: |
            Read .claude/agents/docs-author.md for the theme, voice, and
            component rules. Apply them to every change.
            When the user asks you to regenerate a product, advise them
            to run the /generate-docs skill in Claude Code locally — it
            clones the source repo, extracts the API surface, and authors
            the MDX. Only do an in-place edit from the comment thread when
            the request is small (a single page, a wording fix, or a
            navigation tweak).
