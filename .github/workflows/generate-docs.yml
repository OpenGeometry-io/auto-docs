# Generate / regenerate Mintlify documentation for one product (OpenGeometry or
# OpenPlans) by reading source code from its upstream repository and rewriting
# MDX under that product's folder in this repo.
#
# Trigger: workflow_dispatch only (manual run from the Actions tab).
# Pick the product and an optional ref (defaults to the source repo's main HEAD).
#
# Output is always a pull request titled
#   docs(<product>): regenerate API reference
# Mintlify deploys when the PR merges.

name: Generate docs

on:
  repository_dispatch:
    types: [docs:generate]
  workflow_dispatch:
    inputs:
      product:
        description: Which product to regenerate
        required: true
        type: choice
        options:
          - OpenGeometry
          - OpenPlans
      ref:
        description: Source repo ref to pull (branch, tag, or SHA). Empty = default branch.
        required: false
        type: string
      scope:
        description: What to regenerate. "api" only touches api/**, "all" lets the agent revisit concepts/guides too.
        required: false
        type: choice
        default: api
        options:
          - api
          - all

# Same product can't be regenerated twice in parallel; the second run cancels
# the first so we don't race on docs.json edits.
concurrency:
  group: generate-docs-${{ github.event.client_payload.product || inputs.product }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  generate:
    name: Regenerate ${{ github.event.client_payload.product || inputs.product }} docs
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Resolve inputs
        id: inputs
        env:
          DISPATCH_PRODUCT: ${{ github.event.client_payload.product }}
          DISPATCH_REF: ${{ github.event.client_payload.ref }}
          DISPATCH_FILES: ${{ toJSON(github.event.client_payload.files_changed) }}
          MANUAL_PRODUCT: ${{ inputs.product }}
          MANUAL_REF: ${{ inputs.ref }}
          MANUAL_SCOPE: ${{ inputs.scope }}
        run: |
          set -euo pipefail
          PRODUCT="${DISPATCH_PRODUCT:-$MANUAL_PRODUCT}"
          REF="${DISPATCH_REF:-$MANUAL_REF}"
          SCOPE="${MANUAL_SCOPE:-api}"

          case "$PRODUCT" in
            OpenGeometry) SOURCE_REPO="OpenGeometry-io/OpenGeometry" ;;
            OpenPlans)    SOURCE_REPO="OpenGeometry-io/OpenPlans" ;;
            *) echo "::error::Unknown product '$PRODUCT'"; exit 1 ;;
          esac

          echo "product=$PRODUCT"            >> "$GITHUB_OUTPUT"
          echo "source_repo=$SOURCE_REPO"    >> "$GITHUB_OUTPUT"
          echo "ref=$REF"                    >> "$GITHUB_OUTPUT"
          echo "scope=$SCOPE"                >> "$GITHUB_OUTPUT"

          if [ -n "${DISPATCH_FILES:-}" ] && [ "${DISPATCH_FILES}" != "null" ]; then
            echo "$DISPATCH_FILES" > "$RUNNER_TEMP/files_changed.json"
          else
            echo '[]' > "$RUNNER_TEMP/files_changed.json"
          fi

      - name: Mint installation token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DOCS_BOT_APP_ID }}
          private-key: ${{ secrets.DOCS_BOT_APP_PRIVATE_KEY }}
          owner: OpenGeometry-io
          repositories: |
            auto-docs
            ${{ steps.inputs.outputs.product }}
        continue-on-error: true

      - name: Pick effective token
        id: token
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          PAT_TOKEN: ${{ secrets.AUTO_DOCS_BOT_TOKEN }}
        run: |
          if [ -n "${APP_TOKEN:-}" ]; then
            echo "::add-mask::$APP_TOKEN"
            echo "value=$APP_TOKEN" >> "$GITHUB_OUTPUT"
            echo "source=app" >> "$GITHUB_OUTPUT"
          elif [ -n "${PAT_TOKEN:-}" ]; then
            echo "::add-mask::$PAT_TOKEN"
            echo "value=$PAT_TOKEN" >> "$GITHUB_OUTPUT"
            echo "source=pat" >> "$GITHUB_OUTPUT"
          else
            echo "::error::No DOCS_BOT_APP_ID/DOCS_BOT_APP_PRIVATE_KEY and no AUTO_DOCS_BOT_TOKEN."
            exit 1
          fi

      - name: Checkout auto-docs (target)
        uses: actions/checkout@v4
        with:
          token: ${{ steps.token.outputs.value }}
          path: auto-docs
          fetch-depth: 0

      - name: Checkout source product repo
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.inputs.outputs.source_repo }}
          ref: ${{ steps.inputs.outputs.ref }}
          token: ${{ steps.token.outputs.value }}
          path: source
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install extractor dependencies
        working-directory: auto-docs
        run: npm ci --prefix scripts

      - name: Extract public API surface from source
        id: extract
        env:
          PRODUCT: ${{ steps.inputs.outputs.product }}
        run: |
          node auto-docs/scripts/extract-api-surface.mjs \
            --product="$PRODUCT" \
            --source="$GITHUB_WORKSPACE/source" \
            --out="$RUNNER_TEMP/api-surface.json"
          echo "surface_path=$RUNNER_TEMP/api-surface.json" >> "$GITHUB_OUTPUT"
          node auto-docs/scripts/summarize-surface.mjs "$RUNNER_TEMP/api-surface.json" > "$RUNNER_TEMP/surface-summary.md"

      - name: Run docs author agent
        uses: anthropics/claude-code-base-action@beta
        env:
          PRODUCT: ${{ steps.inputs.outputs.product }}
          SOURCE_REPO: ${{ steps.inputs.outputs.source_repo }}
          SOURCE_REF: ${{ steps.inputs.outputs.ref }}
          SCOPE: ${{ steps.inputs.outputs.scope }}
          API_SURFACE_PATH: ${{ steps.extract.outputs.surface_path }}
          FILES_CHANGED_PATH: ${{ runner.temp }}/files_changed.json
        with:
          anthropic_api_key: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are the OpenGeometry docs author. Read the persona file at
            auto-docs/.claude/agents/docs-author.md before doing anything
            else; it defines the theme rules, MDX component conventions, and
            voice you must follow. Treat that file as inviolable.

            Task: regenerate Mintlify documentation for $PRODUCT using the
            extracted API surface at $API_SURFACE_PATH and the cloned source
            repo at ./source. Files changed in this push are listed at
            $FILES_CHANGED_PATH (may be empty for manual runs).

            Scope is "$SCOPE":
              - api: only touch auto-docs/$PRODUCT/api/** and the api groups
                inside auto-docs/docs.json.
              - all: you may also revisit concepts/, guides/, and examples/
                pages when the source changes contradict them.

            Constraints (also encoded in docs-author.md):
              - Do not change docs.json fields outside
                navigation.products[].tabs for $PRODUCT.
              - Do not invent demo URLs. Only link to demos that already
                exist in the current MDX.
              - Use existing components: <Tabs><Tab>, <ParamField>,
                <ResponseField>, <CardGroup><Card>, <Steps><Step>,
                <Note>/<Tip>/<Info>/<Warning>.
              - Match the voice of the existing MDX (active voice, second
                person, sentence case headings).
              - Keep frontmatter shape: title, description, optional icon.
              - Theme stays almond, primary stays #4460FF, light/dark stay
                #4460FF. Never edit colors or theme.

            When you are done, write a short markdown summary of what you
            changed to $RUNNER_TEMP/agent-summary.md. The PR body uses it.
          allowed_tools: |
            Read,Write,Edit,MultiEdit,Glob,Grep,Bash(node:*),Bash(npx mint:*)
          working_directory: auto-docs
          max_turns: 60

      - name: Validate Mintlify links
        working-directory: auto-docs
        run: |
          npx -y mint@latest broken-links || {
            echo "::warning::mint broken-links reported issues; see logs."
          }

      - name: Read agent summary
        id: summary
        run: |
          if [ -f "$RUNNER_TEMP/agent-summary.md" ]; then
            {
              echo 'body<<EOF_AGENT_SUMMARY'
              cat "$RUNNER_TEMP/agent-summary.md"
              echo
              echo 'EOF_AGENT_SUMMARY'
            } >> "$GITHUB_OUTPUT"
          else
            echo "body=Agent did not produce a summary." >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ steps.token.outputs.value }}
          path: auto-docs
          branch: bot/docs/${{ steps.inputs.outputs.product }}
          base: main
          delete-branch: true
          commit-message: |
            docs(${{ steps.inputs.outputs.product }}): regenerate API reference

            Source: ${{ steps.inputs.outputs.source_repo }}@${{ steps.inputs.outputs.ref }}
            Scope: ${{ steps.inputs.outputs.scope }}
          title: "docs(${{ steps.inputs.outputs.product }}): regenerate API reference"
          body: |
            Automated regeneration of `${{ steps.inputs.outputs.product }}` docs from
            [`${{ steps.inputs.outputs.source_repo }}`](https://github.com/${{ steps.inputs.outputs.source_repo }})
            at `${{ steps.inputs.outputs.ref }}`.

            **Scope:** `${{ steps.inputs.outputs.scope }}`

            ### Agent summary

            ${{ steps.summary.outputs.body }}

            ---

            <details><summary>Extracted API surface</summary>

            See attached `api-surface.json` artifact and the diff in this PR for the page-level changes.

            </details>

            <sub>Triggered by `${{ github.event_name }}`.</sub>
          labels: |
            docs
            automated
            product:${{ steps.inputs.outputs.product }}
          author: "opengeometry-docs-bot[bot] <opengeometry-docs-bot@users.noreply.github.com>"
          committer: "opengeometry-docs-bot[bot] <opengeometry-docs-bot@users.noreply.github.com>"

      - name: Upload extracted surface as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-surface-${{ steps.inputs.outputs.product }}
          path: ${{ steps.extract.outputs.surface_path }}
          if-no-files-found: ignore
          retention-days: 14
